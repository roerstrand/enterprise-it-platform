global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "fastapi"
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: "user_server"
    static_configs:
      - targets: ["host.docker.internal:9101"]

  - job_name: "cmdb_server"
    static_configs:
      - targets: ["host.docker.internal:9102"]

  